<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Favicon ── -->
    <link rel="icon" type="image/jpeg" href="/logo.jpeg" sizes="256x256" />
    <link rel="apple-touch-icon" href="/logo.jpeg" />

    <!-- ── Primary SEO Meta ── -->
    <title>United for Animal Welfare | Compassion For Every Life</title>
    <meta name="description" content="United for Animal Welfare is a registered Public Trust in Jaipur, Rajasthan. We rescue animals, feed 7,000+ cows, protect 5,000+ dogs, support struggling NGOs, and empower communities through education and hygiene programs." />
    <meta name="keywords" content="animal welfare, NGO support, cow feeding, dog rescue, Jaipur, Rajasthan, United for Animal Welfare, Shivajee Vishen, animal rescue India, donate for animals" />
    <meta name="author" content="United for Animal Welfare" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <link rel="canonical" href="https://www.unitedforanimalwelfare.com/" />

    <!-- ── Open Graph (Facebook, LinkedIn, WhatsApp) ── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="United for Animal Welfare" />
    <meta property="og:title" content="United for Animal Welfare | Compassion For Every Life" />
    <meta property="og:description" content="A registered Public Trust rescuing animals, feeding 7,000+ cows, protecting 5,000+ dogs, and empowering communities across India." />
    <meta property="og:image" content="https://www.unitedforanimalwelfare.com/logo.jpeg" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:url" content="https://www.unitedforanimalwelfare.com/" />

    <!-- ── Twitter Card ── -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="United for Animal Welfare | Compassion For Every Life" />
    <meta name="twitter:description" content="Compassion For Every Life — Feeding 7,000+ cows, caring for 5,000+ dogs, empowering girls and students across India." />
    <meta name="twitter:image" content="https://www.unitedforanimalwelfare.com/logo.jpeg" />

    <!-- ── Structured Data: Organization (tells Google your logo) ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "NGO",
      "name": "United for Animal Welfare",
      "alternateName": "UAW",
      "url": "https://www.unitedforanimalwelfare.com",
      "logo": "https://www.unitedforanimalwelfare.com/logo.jpeg",
      "image": "https://www.unitedforanimalwelfare.com/logo.jpeg",
      "description": "United for Animal Welfare is a registered Public Trust in Jaipur, Rajasthan, founded by Shivajee Vishen. We rescue animals, support struggling NGOs, and run daily feeding, hygiene and education programmes.",
      "founder": {
        "@type": "Person",
        "name": "Shivajee Vishen"
      },
      "foundingDate": "2026",
      "foundingLocation": {
        "@type": "Place",
        "name": "Jaipur, Rajasthan, India"
      },
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Basement Floor, Plot No 20, Chaudhary Nagar 2nd, Budhsinghpura, Sanganer",
        "addressLocality": "Jaipur",
        "addressRegion": "Rajasthan",
        "postalCode": "302029",
        "addressCountry": "IN"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+91-7976606854",
        "contactType": "customer service",
        "email": "info@unitedforanimalwelfare.org",
        "availableLanguage": ["English", "Hindi"]
      },
      "sameAs": []
    }
    </script>

    <!-- ── Structured Data: WebSite (sitelinks search box) ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "United for Animal Welfare",
      "url": "https://www.unitedforanimalwelfare.com"
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
